<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Water Bodies – Algae Bloom Index</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
        body {
            margin: 0;
            background-color: black;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        /* =======================
           CONFIDENCE SLIDER UI
        ======================= */
        #confidence-control {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(158, 240, 255, 0.25);
            border-radius: 12px;
            padding: 10px 12px;
            color: #9ef0ff;
            font-family: system-ui, sans-serif;
            width: 260px;
            backdrop-filter: blur(6px);
        }

        #confidence-control .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
        }

        #confidence-slider {
            width: 100%;
        }

        #confidence-value {
            font-variant-numeric: tabular-nums;
            opacity: 0.95;
        }

        #visible-count {
            margin-top: 6px;
            font-size: 0.85rem;
            opacity: 0.85;
        }

        /* =======================
           LOADING OVERLAY
        ======================= */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            text-align: center;
            color: #9ef0ff;
            font-family: system-ui, sans-serif;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(158, 240, 255, 0.2);
            border-top-color: #9ef0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            font-size: 1rem;
            letter-spacing: 0.05em;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<!-- CONFIDENCE FILTER -->
<div id="confidence-control">
    <div class="row">
        <div><b>Confidence filter</b></div>
        <div id="confidence-value">≥ 0.00</div>
    </div>
    <input
        id="confidence-slider"
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0"
    />
    <div id="visible-count">Showing: 0 / 0</div>
</div>

<!-- LOADING SCREEN -->
<div id="loading-overlay">
    <div class="loader">
        <div class="spinner"></div>
        <div class="loading-text">Loading water quality data…</div>
    </div>
</div>

<!-- MAP -->
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* =======================
   MAP INITIALIZATION
======================= */
const map = L.map('map').setView([40, -100], 4);

L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
    {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors © CARTO'
    }
).addTo(map);

/* =======================
   STATE
======================= */
let minConfidence = 0.0;

// Store all rectangles so we can filter without re-fetching
// Each item: { rect: L.Rectangle, conf: number, weight: number }
const allRects = [];

/* =======================
   UTILITIES
======================= */
function clamp(x, min, max) {
    return Math.max(min, Math.min(max, x));
}

/* =======================
   ABI CALCULATION
======================= */
function getABI(entry) {
    const temp = entry.temperature_c ?? entry.temp;

    const tempScore = clamp((+temp - 15) / 15, 0, 1);
    const turbScore = clamp(+entry.turbidity / 5, 0, 1);
    const tdsScore  = clamp(+entry.tds / 500, 0, 1);
    const pHScore   = clamp((+entry.pH - 7) / 2.5, 0, 1);

    return (
        0.35 * tempScore +
        0.30 * turbScore +
        0.20 * tdsScore +
        0.15 * pHScore
    );
}

/* =======================
   ABI → COLOR
======================= */
function abiToColor(abi) {
    const clamped = clamp(abi, 0, 1);
    const hue = (1 - clamped) * 270; // purple → red
    return `hsl(${hue}, 90%, 50%)`;
}

/* =======================
   VISIBILITY TOGGLE
======================= */
function setRectVisible(rect, visible, weight) {
    // Keep them on the map but make them non-interactive and invisible when filtered out.
    rect.setStyle({
        opacity: visible ? 1 : 0,
        fillOpacity: visible ? weight : 0
    });

    // Prevent clicking hidden rectangles (Leaflet SVG)
    const el = rect.getElement && rect.getElement();
    if (el) el.style.pointerEvents = visible ? 'auto' : 'none';
}

/* =======================
   APPLY FILTER
======================= */
function applyConfidenceFilter() {
    let shown = 0;

    for (const item of allRects) {
        const visible = item.conf >= minConfidence;
        setRectVisible(item.rect, visible, item.weight);
        if (visible) shown++;
    }

    // Update UI count
    document.getElementById('visible-count').textContent =
        `Showing: ${shown} / ${allRects.length}`;
}

/* =======================
   ADD MARKER
======================= */
function addMarker(entry) {
    const lat = +entry.lat;
    const lon = +entry.lon;

    const abi = +entry.abi ?? getABI(entry);
    const color = abiToColor(abi);

    // confidence / weight (your dataset uses weight as confidence)
    const conf = +entry.weight ?? 1;
    const weight = conf; // keep your original behavior: opacity scales with confidence

    // 10m x 10m square
    const half = 50; // meters
    const dLat = half / 111320;
    const dLon = half / (111320 * Math.cos(lat * Math.PI / 180));

    const bounds = [
        [lat - dLat, lon - dLon],
        [lat + dLat, lon + dLon]
    ];

    const rect = L.rectangle(bounds, {
        color: color,
        weight: 1,
        fillColor: color,
        fillOpacity: weight
    })
    .addTo(map)
    .bindPopup(`
        <b>Latitude:</b> ${lat}<br>
        <b>Longitude:</b> ${lon}<br>
        <b>ABI:</b> ${abi.toFixed(2)}<br>
        <b>Temperature:</b> ${+(entry.temperature_c ?? entry.temp)} °C<br>
        <b>TDS:</b> ${+entry.tds} ppm<br>
        <b>Turbidity:</b> ${+entry.turbidity}<br>
        <b>pH:</b> ${+entry.pH}<br>
        <b>Timestamp:</b> ${entry.timestamp}<br>
        <b>Confidence:</b> ${conf}
    `);

    // Store for filtering
    allRects.push({ rect, conf, weight });

    // Apply current filter immediately (so if slider > 0, new points respect it)
    setRectVisible(rect, conf >= minConfidence, weight);
}

/* =======================
   LOAD DATA
======================= */
async function loadPixels() {
    const overlay = document.getElementById('loading-overlay');

    try {
        const dataResp = await fetch(`/data/pixels.json?t=${Date.now()}`);

        if (!dataResp.ok) {
            throw new Error('Failed to fetch pixels.json');
        }

        const json = await dataResp.json();

        for (let i = 0; i < json.pixels.length; i++) {
            addMarker(json.pixels[i]);

            // Keep UI responsive for large datasets
            if (i % 100 === 0) {
                await new Promise(r => setTimeout(r, 0));
            }
        }

        // Update initial count after load
        applyConfidenceFilter();

    } catch (err) {
        console.error('Error loading pixels:', err);

    } finally {
        overlay.classList.add('hidden');
        setTimeout(() => overlay.remove(), 500);
    }
}

/* =======================
   SLIDER HOOKUP
======================= */
const slider = document.getElementById('confidence-slider');
const valueLabel = document.getElementById('confidence-value');

function updateSliderUI() {
    minConfidence = +slider.value;
    valueLabel.textContent = `≥ ${minConfidence.toFixed(2)}`;
    applyConfidenceFilter();
}

slider.addEventListener('input', updateSliderUI);

window.onload = () => {
    updateSliderUI(); // set label + default filter
    loadPixels();
};
</script>

</body>
</html>
